<div class="min-vh-100 d-flex align-items-center" style="background: linear-gradient(135deg, var(--navy) 0%, var(--primary) 100%);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center text-white mb-4">
          <i class="bi bi-airplane-engines-fill display-4 text-info"></i>
          <h3 class="fw-bold mt-2">TravelBooking</h3>
        </div>
        <div class="card border-0 shadow-lg" style="border-radius: var(--radius-lg);">
          <div class="card-body p-4">
            <h4 class="fw-bold text-center mb-1" style="color: var(--navy);">เข้าสู่ระบบ</h4>
            <p class="text-muted text-center small mb-4">ยินดีต้อนรับกลับมา</p>

            @if (error) {
              <div class="alert alert-danger d-flex align-items-center gap-2 py-2">
                <i class="bi bi-exclamation-circle-fill"></i>{{ error }}
              </div>
            }

            <div class="mb-3">
              <label class="form-label fw-medium small">อีเมล</label>
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
                <input type="email" class="form-control" [(ngModel)]="email" placeholder="your@email.com" required>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-medium small">รหัสผ่าน</label>
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" class="form-control" [(ngModel)]="password" placeholder="••••••••" required>
              </div>
            </div>
            <button class="btn btn-primary w-100 py-2 fw-semibold" (click)="submit()" [disabled]="loading">
              @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
              เข้าสู่ระบบ
            </button>
            <hr class="my-3">
            <p class="text-center text-muted small mb-0">
              ยังไม่มีบัญชี?
              <a routerLink="/register" class="fw-semibold" style="color: var(--primary);">สมัครสมาชิกฟรี</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
